<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Willkommen - L34NROHN3R</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container { text-align: center; padding: 2rem; max-width: 700px; }
    .avatar {
      width: 120px; height: 120px; border-radius: 50%;
      background: linear-gradient(45deg, #f093fb, #f5576c);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; margin: 0 auto 2rem auto;
      box-shadow: 0 0 30px rgba(240, 147, 251, 0.5);
    }
    h1 { font-size: 3rem; margin-bottom: 1rem; color: #f093fb; }
    p { font-size: 1.2rem; color: #ccc; line-height: 1.8; margin-bottom: 2rem; }
    .buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn { padding: 0.8rem 2rem; border: none; border-radius: 50px; font-size: 1rem; cursor: pointer; text-decoration: none; transition: transform 0.2s; }
    .btn-primary { background: linear-gradient(90deg, #f093fb, #f5576c); color: #fff; }
    .btn-secondary { background: transparent; border: 2px solid #f093fb; color: #f093fb; }
    .btn:hover { transform: translateY(-3px); }
    .footer { margin-top: 3rem; font-size: 0.9rem; color: #666; }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">Hi</div>
    <h1>Hallo, ich bin L34NROHN3R</h1>
    <p>Willkommen auf meiner Website! Diese Seite wurde kostenlos mit GitHub Pages erstellt.</p>
    <div class="buttons">
      <a href="https://github.com/L34NROHN3R" class="btn btn-primary">GitHub Profil</a>
      <a href="mailto:deine@email.de" class="btn btn-secondary">Kontakt</a>
    </div>
    <div class="footer"><p>Erstellt mit GitHub Pages</p></div>
  </div>
</body>
</html>
